<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mosaic Collage Maker</title>
<link rel="icon" type="image/png" href="favicon.png">
<style>
  :root {
    --ink: #1c2430;
    --muted: #5b6675;
    --accent: #2f6fb0;
    --border: #e2e6eb;
    --bg: #fafbfc;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.6;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .wrap {
    max-width: 480px;
    padding: 40px 24px;
    text-align: center;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 8px;
    letter-spacing: -0.01em;
  }
  p.tagline {
    font-size: 15px;
    color: var(--muted);
    margin: 0 0 36px;
  }
  .links {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .links a {
    display: inline-block;
    padding: 10px 20px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--ink);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
  }
  .links a:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  /* Brand: mosaic colour strip echoing the app icon's tiles */
  .brandbar {
    position: fixed; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg,
      #e8695f 0 16.66%, #f0932b 0 33.33%, #35c759 0 50%,
      #2ec4a0 0 66.66%, #3b93e0 0 83.33%, #e74c3c 0 100%);
  }
  .hero-logo {
    width: 80px; height: 80px; border-radius: 18px;
    display: block; margin: 0 auto 18px;
    box-shadow: 0 3px 14px rgba(28, 36, 48, 0.16);
  }
</style>
</head>
<body>
<div class="brandbar"></div>
<div class="wrap">
  <img class="hero-logo" src="logo.png" alt="Mosaic Collage Maker app icon">
  <h1>Mosaic Collage Maker</h1>
  <p class="tagline">Automatic multi-page photo layout for Mac and Windows</p>
  <div class="links">
    <a href="help.html">Help Guide</a>
    <a href="templates.html">Templates</a>
    <a href="support.html">Support</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="blog.html">Blog</a>
  </div>
</div>
</body>
</html>
